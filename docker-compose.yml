services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vault"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://vault:vault@db:5432/vault?sslmode=disable
      LISTEN_ADDR: ":8080"
      TEST_PURCHASE_DELAY_MS: ${TEST_PURCHASE_DELAY_MS:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
